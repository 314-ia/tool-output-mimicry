name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest + dry-run (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: run unit tests
        run: pytest tests/ -v

      - name: structural dry-run (offline reproducer smoke)
        # The dry-run is the canonical "primitive composition still
        # valid" check -- it must pass on every commit, with zero
        # credentials, on every supported Python.
        run: tom-repro-finbot --dry-run
